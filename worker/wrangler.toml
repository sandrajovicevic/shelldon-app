name = "shelldon-reminders"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Fires every minute to check for due commitments and send Web Push reminders.
[triggers]
crons = ["* * * * *"]

[vars]
ALLOWED_ORIGIN = "https://sandrajovicevic.github.io"
VAPID_SUBJECT = "mailto:sandra.s.jovicevic@gmail.com"

# Rate-limit counters only (TTL-based) -- devices/commitments now live in D1 below.
[[kv_namespaces]]
binding = "SHELLDON_KV"
id = "028501db37e545d0aa87d21d5a99a31f"

# Created via `wrangler d1 create shelldon-db`, database_id filled in after creation.
# Schema applied via `wrangler d1 execute shelldon-db --file=./migrations/0001_init.sql`.
[[d1_databases]]
binding = "DB"
database_name = "shelldon-db"
database_id = "ec26d508-0341-447c-b9aa-7c1da7027d85"

# Secrets (set via `wrangler secret put`, never stored here):
#   VAPID_PUBLIC_KEY
#   VAPID_PRIVATE_KEY
